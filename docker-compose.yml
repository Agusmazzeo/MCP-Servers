version: '3.8'

services:
  zencrm:
    build:
      context: .
      dockerfile: Dockerfile.zencrm
    ports:
      - "8080:8080"
    environment:
      - ZENCRM_API_URL=${ZENCRM_API_URL}
      - ZENCRM_API_KEY=${ZENCRM_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  allfunds:
    build:
      context: .
      dockerfile: Dockerfile.allfunds
    ports:
      - "8081:8081"
    environment:
      - GRAPHQL_URL=${GRAPHQL_URL:-https://api.allfunds.dev/graphql}
      - EMAIL=${EMAIL}
      - PASSWORD=${PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
