version: '3.8'

services:
  zencrm:
    build:
      context: ./servers/zencrm
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - API_BASE_URL=${API_BASE_URL}
      - JWT_TOKEN=${JWT_TOKEN}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  allfunds:
    build:
      context: ./servers/allfunds
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - ALLFUNDS_GRAPHQL_URL=${ALLFUNDS_GRAPHQL_URL:-https://app.allfunds.com/graphql}
      - ALLFUNDS_EMAIL=${ALLFUNDS_EMAIL}
      - ALLFUNDS_PASSWORD=${ALLFUNDS_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
